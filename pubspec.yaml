name: health_safety_inspection
description: Health & Safety Inspection Tool
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.19.0
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  google_sign_in: ^6.2.1
  cloud_firestore: ^5.5.0
  shared_preferences: ^2.3.0
  purchases_flutter: ^8.1.0
  pdf: ^3.11.1
  printing: ^5.13.3
  image_picker: ^1.1.2
  path_provider: ^2.1.4
  fl_chart: ^0.69.2
  mobile_scanner: ^6.0.2
  share_plus: ^10.1.3
  flutter_local_notifications: ^18.0.1
  http: ^1.2.2
  permission_handler: ^11.3.1
  hand_signature: ^3.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
